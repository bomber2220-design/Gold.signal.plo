<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLD SIGNAL PRO | SOUND MODE</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFD700; --gold2: #FFA500; --gold-dark: #B8860B;
  --bg: #04080d; --panel: rgba(8,14,22,0.97);
  --buy: #00e5a0; --sell: #ff3860; --text: #c8e4ff; --dim: #3d607a;
  --border: rgba(255,215,0,0.13);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;}
.app{max-width:1060px;margin:0 auto;padding:18px 14px 50px;}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border:1px solid var(--border);border-radius:6px;background:var(--panel);margin-bottom:16px;}
.logo-box{width:44px;height:44px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;}
.price-strip{display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-bottom:16px;}
.pcard{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:14px 18px;}
.pval{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:700;color:var(--gold);}
.signal-wrap{display:grid;grid-template-columns:auto 1fr;gap:16px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:22px;margin-bottom:16px;}
.sig-circle{width:110px;height:110px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid var(--dim);}
.sig-circle.buy{border-color:var(--buy);box-shadow:0 0 30px rgba(0,229,160,.25);}
.sig-circle.sell{border-color:var(--sell);box-shadow:0 0 30px rgba(255,56,96,.25);}
.sig-rows{display:flex;flex-direction:column;flex:1;}
.srow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.slbl{font-size:10px;color:var(--dim);letter-spacing:2px;}
.sval{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;}
.btn-row{display:flex;gap:10px;margin-bottom:16px;}
.btn{flex:1;padding:15px;border:none;border-radius:8px;font-family:'Orbitron',sans-serif;font-weight:700;cursor:pointer;}
.btn-buy{background:rgba(0,229,160,0.1);color:var(--buy);border:1px solid var(--buy);}
.btn-sell{background:rgba(255,56,96,0.1);color:var(--sell);border:1px solid var(--sell);}
</style>
</head>
<body>
<div class="app">
<header>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="logo-box">XAU</div>
    <div style="font-family:'Orbitron';font-weight:700;color:var(--gold)">GOLD SIGNAL PRO</div>
  </div>
  <div id="status" style="font-size:10px;color:var(--buy)">● ONLINE</div>
</header>

<div class="price-strip">
  <div class="pcard">
    <div style="font-size:9px;color:var(--dim);">LIVE PRICE (XAU/USD)</div>
    <div class="pval" id="livePrice">----.--</div>
  </div>
  <div class="pcard">
    <div style="font-size:9px;color:var(--dim);">VOLUME</div>
    <div style="font-size:12px;color:var(--gold)">SOUND ON</div>
  </div>
</div>

<div class="signal-wrap">
  <div id="sigCircle" class="sig-circle">
    <div id="sigTxt" style="font-weight:900;font-size:18px;">WAIT</div>
    <div id="sigArrow" style="font-size:24px">→</div>
  </div>
  <div class="sig-rows">
    <div class="srow"><span class="slbl">ENTRY</span><span class="sval" id="sEntry" style="color:var(--gold)">----.--</span></div>
    <div class="srow"><span class="slbl">TAKE PROFIT</span><span class="sval" style="color:var(--buy)" id="sTP">----.--</span></div>
    <div class="srow"><span class="slbl">STOP LOSS</span><span class="sval" style="color:var(--sell)" id="sSL">----.--</span></div>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-buy" onclick="force('buy')">ENTRY BUY</button>
  <button class="btn btn-sell" onclick="force('sell')">ENTRY SELL</button>
</div>
<div style="text-align:center;font-size:10px;color:var(--dim);">※ボタン操作時に通知音が鳴ります</div>
</div>

<script>
let currentLivePrice = 0;

// 通知音の設定
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  if (type === 'buy') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, audioCtx.currentTime); // 高い音
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
  } else if (type === 'sell') {
    osc.type = 'sine';
    osc.frequency.setValueAtTime(440, audioCtx.currentTime); // 低い音
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.2);
  }
}

async function getPrice(){
  try {
    const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
    const data = await res.json();
    currentLivePrice = parseFloat(data.price);
    document.getElementById('livePrice').textContent = currentLivePrice.toLocaleString(undefined, {minimumFractionDigits: 2});
  } catch(e) {}
}

function force(dir){
  // ユーザー操作時にAudioContextを有効化
  if (audioCtx.state === 'suspended') audioCtx.resume();
  
  if(currentLivePrice === 0) return;
  const entry = currentLivePrice;
  const offset = 15.0;

  playSound(dir); // 音を鳴らす

  document.getElementById('sEntry').textContent = entry.toFixed(2);
  const circle = document.getElementById('sigCircle');
  const txt = document.getElementById('sigTxt');
  const arrow = document.getElementById('sigArrow');

  if(dir === 'buy'){
    circle.className = 'sig-circle buy';
    txt.textContent = 'BUY'; arrow.textContent = '↑';
    document.getElementById('sTP').textContent = (entry + offset).toFixed(2);
    document.getElementById('sSL').textContent = (entry - 10.0).toFixed(2);
  } else {
    circle.className = 'sig-circle sell';
    txt.textContent = 'SELL'; arrow.textContent = '↓';
    document.getElementById('sTP').textContent = (entry - offset).toFixed(2);
    document.getElementById('sSL').textContent = (entry + 10.0).toFixed(2);
  }
}

setInterval(getPrice, 5000);
getPrice();
</script>
</body>
</html>
