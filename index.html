<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold Signal Pro</title>

<style>
body{background:#04080d;color:#c8e4ff;font-family:monospace;text-align:center}
.box{border:1px solid gold;margin:15px;padding:15px;border-radius:10px}
.buy{color:#00e5a0}
.sell{color:#ff3860}
.wait{color:#7aabcc}
</style>
</head>

<body>

<h2>GOLD SIGNAL PRO</h2>

<div class="box">
  <div>現在価格</div>
  <h1 id="price">--</h1>
</div>

<div class="box">
  <div>トレンド</div>
  <h2 id="trend">--</h2>
</div>

<div class="box">
  <div>エントリー</div>
  <h1 id="signal">--</h1>
</div>

<div class="box">
  <div>ENTRY</div><div id="entry">--</div>
  <div>TP</div><div id="tp">--</div>
  <div>SL</div><div id="sl">--</div>
</div>

<script>

// 🔑 ここにAPIキー入れる
const API_KEY = "ここにあなたのAPIキー";

let prices = [];

// ======================
// ローソク足取得
// ======================
async function fetchCandle(){
  try{
    let url = `https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=5min&outputsize=100&apikey=${API_KEY}`;
    let r = await fetch(url);
    let d = await r.json();

    if(!d.values) return;

    // 新しい順 → 古い順を反転
    prices = d.values.map(c => parseFloat(c.close)).reverse();

    document.getElementById("price").innerText =
      prices[prices.length-1].toFixed(2);

    calculate();

  }catch(e){
    console.log("API error");
  }
}

// ======================
// EMA
// ======================
function ema(period){
  let k = 2/(period+1);
  let e = prices[0];
  for(let i=1;i<prices.length;i++){
    e = prices[i]*k + e*(1-k);
  }
  return e;
}

// ======================
// RSI
// ======================
function rsi(){
  if(prices.length < 15) return 50;

  let g=0,l=0;
  for(let i=1;i<15;i++){
    let d = prices[i]-prices[i-1];
    if(d>0) g+=d; else l+=Math.abs(d);
  }
  let rs = g/(l||1);
  return 100-(100/(1+rs));
}

// ======================
// メインロジック
// ======================
function calculate(){

  let e20 = ema(20);
  let e50 = ema(50);
  let r = rsi();
  let price = prices[prices.length-1];

  // トレンド
  let trend = "レンジ";
  if(e20 > e50) trend = "上昇トレンド";
  if(e20 < e50) trend = "下降トレンド";

  document.getElementById("trend").innerText = trend;

  // エントリー判定
  let signal = "WAIT";

  // 押し目買い
  if(trend === "上昇トレンド" && price < e20 && r > 40){
    signal = "BUY";
  }

  // 戻り売り
  if(trend === "下降トレンド" && price > e20 && r < 60){
    signal = "SELL";
  }

  let sigEl = document.getElementById("signal");
  sigEl.innerText = signal;
  sigEl.className = signal.toLowerCase();

  // TP / SL
  let atr = 15;
  let tp = signal==="BUY" ? price+30 : price-30;
  let sl = signal==="BUY" ? price-15 : price+15;

  document.getElementById("entry").innerText = price.toFixed(2);
  document.getElementById("tp").innerText = tp.toFixed(2);
  document.getElementById("sl").innerText = sl.toFixed(2);
}

// ======================
fetchCandle();
setInterval(fetchCandle, 15000);

</script>

</body>
</html>
