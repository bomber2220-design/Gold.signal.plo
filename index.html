<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Signal Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background-color: #04080d; color: #FFD700; font-family: sans-serif; text-align: center; }
        .card { border: 1px solid #FFD700; border-radius: 10px; margin: 20px; padding: 20px; }
        h1 { color: #FFD700; }
        .value { font-size: 2em; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>GOLD SIGNAL PRO</h1>
    
    <div class="card">
        <div>価格</div>
        <div id="price" class="value">--</div>
    </div>

    <div class="card">
        <div>シグナル</div>
        <div id="signal" class="value">--</div>
        <div id="time">--</div>
    </div>

    <div class="card">
        <div>ENTRY</div>
        <div id="entry" class="value">--</div>
        <div>TP: <span id="tp">--</span></div>
        <div>SL: <span id="sl">--</span></div>
    </div>

    <script>
        // 3つ目のファイル(sw.js)を登録する魔法
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // ここに価格データを取得する処理を後で追加できます
        console.log("アプリ起動準備完了");
    </script>
</body>
</html>
