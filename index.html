<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLD SIGNAL PRO</title>

<style>
body{
  background:#0b0f14;
  color:#fff;
  font-family:sans-serif;
  text-align:center;
  padding:20px;
}
.box{
  border:1px solid gold;
  border-radius:12px;
  padding:20px;
  margin:15px 0;
}
.price{font-size:32px}
.up{color:#00e5a0}
.down{color:#ff3860}
button{
  padding:12px 20px;
  background:gold;
  border:none;
  border-radius:8px;
  font-weight:bold;
}
input{
  padding:10px;
  margin:5px;
  width:80%;
  border-radius:6px;
  border:none;
}
</style>
</head>

<body>

<h1>GOLD SIGNAL PRO</h1>

<div class="box">
  <div>現在価格</div>
  <div id="price" class="price">--</div>
</div>

<div class="box">
  <div>トレンド</div>
  <div id="trend">--</div>
</div>

<div class="box">
  <div>シグナル</div>
  <div id="signal">--</div>
</div>

<div class="box">
  <div id="tp">TP: --</div>
  <div id="sl">SL: --</div>
  <div id="lot">Lot: --</div>
</div>

<div class="box">
  <div>時間足トレンド</div>
  <div id="summary"></div>
  <div id="tf"></div>
</div>

<div class="box">
  <input id="key" placeholder="APIキー">
  <input id="balance" placeholder="口座残高 (例:100000)">
  <button onclick="start()">開始</button>
</div>

<script>

let API_KEY="";
let BALANCE=100000;

// =====================
// スタート
// =====================
function start(){
  API_KEY = document.getElementById("key").value;
  BALANCE = parseFloat(document.getElementById("balance").value) || 100000;

  if(!API_KEY){
    alert("APIキー入れて");
    return;
  }

  fetchData();
  setInterval(fetchData,60000);
}

// =====================
// データ取得
// =====================
async function fetchData(){

  let url = `https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=5min&outputsize=50&apikey=${API_KEY}`;

  let r = await fetch(url);
  let d = await r.json();

  if(!d.values) return;

  let candles = d.values.reverse();
  let closes = candles.map(v=>parseFloat(v.close));

  let price = closes[closes.length-1];
  document.getElementById("price").textContent = price.toFixed(2);

  let e20 = ema(closes,20);
  let e50 = ema(closes,50);

  let trend = e20>e50?"上昇":"下降";
  let signal = e20>e50?"BUY":"SELL";

  document.getElementById("trend").textContent = trend;
  document.getElementById("signal").textContent = signal;

  // ===== ATR =====
  let atr = calcATR(candles,14);

  // ===== TP / SL =====
  let tp = signal=="BUY"?price + atr*2 : price - atr*2;
  let sl = signal=="BUY"?price - atr   : price + atr;

  // ===== ロット計算（1%リスク）=====
  let risk = BALANCE * 0.01;
  let lot = risk / atr;

  document.getElementById("tp").textContent = "TP: "+tp.toFixed(2);
  document.getElementById("sl").textContent = "SL: "+sl.toFixed(2);
  document.getElementById("lot").textContent = "Lot: "+lot.toFixed(2);

  renderTF();
}

// =====================
// EMA
// =====================
function ema(arr,p){
  let k=2/(p+1);
  let e=arr[0];
  for(let i=1;i<arr.length;i++){
    e=arr[i]*k+e*(1-k);
  }
  return e;
}

// =====================
// ATR
// =====================
function calcATR(data,period=14){

  if(data.length < period+1) return 10;

  let trs = [];

  for(let i=1;i<data.length;i++){
    let high = parseFloat(data[i].high);
    let low  = parseFloat(data[i].low);
    let prevClose = parseFloat(data[i-1].close);

    let tr = Math.max(
      high - low,
      Math.abs(high - prevClose),
      Math.abs(low - prevClose)
    );

    trs.push(tr);
  }

  let atr = trs.slice(-period).reduce((a,b)=>a+b,0)/period;
  return atr;
}

// =====================
// 時間足
// =====================
async function getTF(interval){

  let url = `https://api.twelvedata.com/time_series?symbol=XAU/USD&interval=${interval}&outputsize=50&apikey=${API_KEY}`;

  let r = await fetch(url);
  let d = await r.json();

  if(!d.values) return "wait";

  let arr = d.values.map(v=>parseFloat(v.close)).reverse();

  let e20 = ema(arr,20);
  let e50 = ema(arr,50);

  if(e20>e50) return "up";
  if(e20<e50) return "down";
  return "wait";
}

// =====================
// 時間足表示
// =====================
async function renderTF(){

  let list = [
    {n:"5分",v:"5min"},
    {n:"15分",v:"15min"},
    {n:"30分",v:"30min"},
    {n:"1時間",v:"1h"},
    {n:"4時間",v:"4h"}
  ];

  let res=[];

  for(let t of list){
    let d = await getTF(t.v);
    res.push({n:t.n,d});
  }

  let shortUp = res.slice(0,3).filter(r=>r.d=="up").length;
  let longDown = res.slice(3).filter(r=>r.d=="down").length;

  let summary = (shortUp>=2?"短期↑":"短期↓")+" / "+(longDown>=1?"長期↓":"長期↑");

  document.getElementById("summary").innerHTML = summary;

  let html="";

  res.forEach(r=>{
    let a = r.d=="up"?"↑":r.d=="down"?"↓":"-";
    let c = r.d=="up"?"up":"down";
    html+=`<div class="${c}">${r.n} ${a}</div>`;
  });

  document.getElementById("tf").innerHTML = html;
}

</script>

</body>
</html>
