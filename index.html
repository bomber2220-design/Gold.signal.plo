<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLD SIGNAL PRO FIXED</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
  background:#04080d;color:#c8e4ff;
  font-family:'Share Tech Mono',monospace;
  padding:10px;
}
.gold{color:#FFD700;font-size:28px;font-weight:700}
.small{color:#7aabcc;font-size:11px}
.box{border:1px solid #222;padding:12px;margin-bottom:10px;border-radius:8px}
.buy{color:#00e5a0}
.sell{color:#ff3860}
</style>
</head>

<body>

<div class="box">
  <div class="small">XAUUSD REAL PRICE</div>
  <div class="gold" id="price">---</div>
  <div class="small" id="priceSource">loading...</div>
</div>

<div class="box">
  ENTRY: <span id="entry">---</span><br>
  TP1: <span id="tp1">---</span><br>
  TP2: <span id="tp2">---</span><br>
  SL: <span id="sl">---</span>
</div>

<script>

let price = 0;
let sig = "buy";

/* =========================
   ★ PRICE統一処理（核心）
========================= */
function applyPrice(p){
  price = p;

  document.getElementById("price").textContent =
    price.toLocaleString('en-US',{minimumFractionDigits:2});

  document.getElementById("priceSource").textContent = "LIVE";

  updateCalc();
}

/* =========================
   ★ TP/SL計算（変更なしロジック）
========================= */
function updateCalc(){

  const atr = 18;
  const isBuy = sig === "buy";

  const tp1 = isBuy ? price + atr*1.5 : price - atr*1.5;
  const tp2 = isBuy ? price + atr*3.0 : price - atr*3.0;
  const sl  = isBuy ? price - atr*1.0 : price + atr*1.0;

  document.getElementById("entry").textContent = price.toFixed(2);
  document.getElementById("tp1").textContent = tp1.toFixed(2);
  document.getElementById("tp2").textContent = tp2.toFixed(2);
  document.getElementById("sl").textContent = sl.toFixed(2);
}

/* =========================
   ★ リアル価格取得（唯一の正解）
========================= */
async function fetchGoldPrice(){

  try{
    const r = await fetch("https://api.metals.live/v1/spot/gold");
    const d = await r.json();

    const raw = Array.isArray(d) ? d[0].gold : d.gold;

    if(raw){
      applyPrice(parseFloat(raw.toFixed(2)));
    }

  }catch(e){
    document.getElementById("priceSource").textContent = "ERROR";
  }
}

/* =========================
   ★ refresh完全無効化（重要）
   ※ここがズレ原因だった部分
========================= */
function refresh(){
  // 何もしない（価格を絶対触らない）
  updateCalc();
}

/* =========================
   ★ 起動
========================= */
fetchGoldPrice();
setInterval(fetchGoldPrice, 10000);

</script>

</body>
</html>
