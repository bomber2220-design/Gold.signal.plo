<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOLD SIGNAL PRO | FULL VERSION</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFD700; --gold2: #FFA500; --gold-dark: #B8860B; --gold-glow: rgba(255,215,0,0.3);
  --bg: #04080d; --panel: rgba(8,14,22,0.97);
  --buy: #00e5a0; --sell: #ff3860; --neutral: #7aabcc; --text: #c8e4ff; --dim: #3d607a;
  --border: rgba(255,215,0,0.13);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;}
.app{max-width:1060px;margin:0 auto;padding:18px 14px 50px;}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border:1px solid var(--border);border-radius:6px;background:var(--panel);margin-bottom:16px;}
.logo-box{width:44px;height:44px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;box-shadow:0 0 15px var(--gold-glow);}
.price-strip{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px;margin-bottom:16px;}
.pcard{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:14px 18px;}
.plabel{font-size:9px;color:var(--dim);letter-spacing:2px;margin-bottom:5px;}
.pval{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:700;color:var(--gold);}
.pval.sm{font-size:18px;color:var(--neutral);}

.signal-wrap{display:grid;grid-template-columns:auto 1fr;gap:16px;background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:22px;margin-bottom:16px;}
.sig-circle{width:110px;height:110px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid var(--dim);}
.sig-circle.buy{border-color:var(--buy);box-shadow:0 0 30px rgba(0,229,160,.25);}
.sig-circle.sell{border-color:var(--sell);box-shadow:0 0 30px rgba(255,56,96,.25);}
.sig-rows{display:flex;flex-direction:column;flex:1;}
.srow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);}
.slbl{font-size:10px;color:var(--dim);letter-spacing:2px;}
.sval{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;}

.ind-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.icard{background:var(--panel);border:1px solid rgba(255,255,255,.06);border-radius:6px;padding:12px 14px;}
.iname{font-size:9px;color:var(--dim);margin-bottom:5px;}
.ival{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:var(--buy);}

.btn-row{display:flex;gap:10px;margin-bottom:16px;}
.btn{flex:1;padding:15px;border:none;border-radius:8px;font-family:'Orbitron',sans-serif;font-weight:700;cursor:pointer;}
.btn-buy{background:rgba(0,229,160,0.1);color:var(--buy);border:1px solid var(--buy);}
.btn-sell{background:rgba(255,56,96,0.1);color:var(--sell);border:1px solid var(--sell);}
.flash{animation: fl 0.5s ease;}
@keyframes fl{0%{opacity:1}30%{opacity:0.3}100%{opacity:1}}
@media(max-width:680px){ .price-strip{grid-template-columns:1fr 1fr;} .ind-grid{grid-template-columns:1fr 1fr;} }
</style>
</head>
<body>
<div class="app">
<header>
  <div style="display:flex;align-items:center;gap:12px;">
    <div class="logo-box">XAU</div>
    <div>
      <div style="font-family:'Orbitron';font-weight:700;color:var(--gold)">GOLD SIGNAL PRO</div>
      <div style="font-size:9px;color:var(--dim);">XAUUSD · XM TRADING</div>
    </div>
  </div>
  <div id="status" style="font-size:10px;color:var(--buy)">● LIVE (BINANCE)</div>
</header>

<div class="price-strip">
  <div class="pcard">
    <div class="plabel">XAUUSD 現在値</div>
    <div class="pval" id="livePrice">----.--</div>
  </div>
  <div class="pcard">
    <div class="plabel">スプレッド</div>
    <div class="pval sm">0.38</div>
  </div>
  <div class="pcard">
    <div class="plabel">ATR (14)</div>
    <div class="pval sm">18.42</div>
  </div>
  <div class="pcard">
    <div class="plabel">セッション</div>
    <div class="pval sm" style="color:var(--buy); font-size:12px;">NY OPEN</div>
  </div>
</div>

<div class="signal-wrap">
  <div id="sigCircle" class="sig-circle">
    <div id="sigTxt" style="font-weight:900;font-size:20px;">WAIT</div>
    <div id="sigArrow" style="font-size:24px">→</div>
  </div>
  <div class="sig-rows">
    <div class="srow"><span class="slbl">エントリー</span><span class="sval" id="sEntry" style="color:var(--gold)">----.--</span></div>
    <div class="srow"><span class="slbl">TP 1</span><span class="sval" style="color:var(--buy)" id="sTP1">----.--</span></div>
    <div class="srow"><span class="slbl">TP 2</span><span class="sval" style="color:var(--buy)" id="sTP2">----.--</span></div>
    <div class="srow"><span class="slbl">ストップロス</span><span class="sval" style="color:var(--sell)" id="sSL">----.--</span></div>
    <div class="srow"><span class="slbl">R:R レシオ</span><span class="sval" style="color:#a78bfa" id="sRR">1 : 2.5</span></div>
  </div>
</div>

<div class="ind-grid">
  <div class="icard"><div class="iname">RSI (14)</div><div class="ival">56.8</div></div>
  <div class="icard"><div class="iname">MACD</div><div class="ival">+1.24</div></div>
  <div class="icard"><div class="iname">EMA 50</div><div class="ival">UP</div></div>
</div>

<div class="btn-row">
  <button class="btn btn-buy" onclick="force('buy')">▲ BUY 確認</button>
  <button class="btn btn-sell" onclick="force('sell')">▼ SELL 確認</button>
</div>
</div>

<script>
let currentPrice = 0;
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(type === 'buy' ? 880 : 440, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

async function fetchPrice() {
  try {
    const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=PAXGUSDT');
    const data = await res.json();
    const newPrice = parseFloat(data.price);
    if (newPrice !== currentPrice) {
      currentPrice = newPrice;
      const el = document.getElementById('livePrice');
      el.textContent = currentPrice.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
      el.classList.remove('flash');
      void el.offsetWidth;
      el.classList.add('flash');
    }
  } catch (e) {}
}

function force(dir) {
  if (currentPrice === 0) return;
  playSound(dir);
  const entry = currentPrice;
  const atr = 18.42;
  document.getElementById('sEntry').textContent = entry.toFixed(2);
  const circle = document.getElementById('sigCircle');
  const txt = document.getElementById('sigTxt');
  const arrow = document.getElementById('sigArrow');

  if (dir === 'buy') {
    circle.className = 'sig-circle buy';
    txt.textContent = 'BUY'; arrow.textContent = '↑';
    document.getElementById('sTP1').textContent = (entry + (atr * 1.5)).toFixed(2);
    document.getElementById('sTP2').textContent = (entry + (atr * 3.0)).toFixed(2);
    document.getElementById('sSL').textContent = (entry - (atr * 1.0)).toFixed(2);
  } else {
    circle.className = 'sig-circle sell';
    txt.textContent = 'SELL'; arrow.textContent = '↓';
    document.getElementById('sTP1').textContent = (entry - (atr * 1.5)).toFixed(2);
    document.getElementById('sTP2').textContent = (entry - (atr * 3.0)).toFixed(2);
    document.getElementById('sSL').textContent = (entry + (atr * 1.0)).toFixed(2);
  }
}

setInterval(fetchPrice, 3000);
fetchPrice();
document.body.addEventListener('touchstart', () => { if (audioCtx.state === 'suspended') audioCtx.resume(); }, {once: true});
</script>
</body>
</html>
